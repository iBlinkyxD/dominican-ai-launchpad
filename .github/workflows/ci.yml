name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check — landing
        run: npx tsc --noEmit -p apps/landing/tsconfig.app.json

      - name: Type check — hub
        run: npx tsc --noEmit -p apps/hub/tsconfig.app.json

      - name: Type check — academy
        run: npx tsc --noEmit -p apps/academy/tsconfig.app.json

      - name: Type check — admin
        run: npx tsc --noEmit -p apps/admin/tsconfig.app.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.example.com
          VITE_ACADEMY_API_URL: https://placeholder.example.com
          VITE_LANDING_URL: https://placeholder.example.com
          VITE_HUB_URL: https://placeholder.example.com
          VITE_ACADEMY_URL: https://placeholder.example.com
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
